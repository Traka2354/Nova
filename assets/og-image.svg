<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0B"/>
  <!-- Gold border -->
  <rect x="8" y="8" width="1184" height="614" fill="none" stroke="#D4A017" stroke-width="3" rx="12"/>
  <!-- Subtle grid lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(212,160,23,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(212,160,23,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo area -->
  <circle cx="600" cy="170" r="54" fill="rgba(212,160,23,0.12)" stroke="rgba(212,160,23,0.3)" stroke-width="1.5"/>
  <text x="600" y="185" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#D4A017" text-anchor="middle">⚡</text>

  <!-- Title -->
  <text x="600" y="275" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">SONIC AI</text>
  <text x="600" y="350" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#F5C842" text-anchor="middle" letter-spacing="-2">CopyX</text>

  <!-- Subtitle -->
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="26" fill="#888888" text-anchor="middle" letter-spacing="1">AI-Powered Gold Copy Trading</text>

  <!-- Divider -->
  <line x1="300" y1="440" x2="900" y2="440" stroke="rgba(212,160,23,0.3)" stroke-width="1"/>

  <!-- Stat pills -->
  <!-- $10 min -->
  <rect x="195" y="462" width="220" height="62" rx="31" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <text x="305" y="489" font-family="Arial, sans-serif" font-size="13" fill="#D4A017" text-anchor="middle" font-weight="700" letter-spacing="1">MIN DEPOSIT</text>
  <text x="305" y="513" font-family="Arial Black, Arial, sans-serif" font-size="20" fill="#F5C842" text-anchor="middle" font-weight="900">$10</text>

  <!-- 180K+ copiers -->
  <rect x="490" y="462" width="220" height="62" rx="31" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <text x="600" y="489" font-family="Arial, sans-serif" font-size="13" fill="#D4A017" text-anchor="middle" font-weight="700" letter-spacing="1">ACTIVE COPIERS</text>
  <text x="600" y="513" font-family="Arial Black, Arial, sans-serif" font-size="20" fill="#F5C842" text-anchor="middle" font-weight="900">180K+</text>

  <!-- 24/7 AI -->
  <rect x="785" y="462" width="220" height="62" rx="31" fill="rgba(212,160,23,0.1)" stroke="rgba(212,160,23,0.4)" stroke-width="1.5"/>
  <text x="895" y="489" font-family="Arial, sans-serif" font-size="13" fill="#D4A017" text-anchor="middle" font-weight="700" letter-spacing="1">AUTO TRADING</text>
  <text x="895" y="513" font-family="Arial Black, Arial, sans-serif" font-size="20" fill="#F5C842" text-anchor="middle" font-weight="900">24/7 AI</text>

  <!-- Bottom tagline -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="16" fill="rgba(212,160,23,0.6)" text-anchor="middle" letter-spacing="3">sonicaicopyx.com</text>
</svg>
